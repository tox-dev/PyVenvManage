# Secrets required: PUBLISH_TOKEN, PRIVATE_KEY, PRIVATE_KEY_PASSWORD, CERTIFICATE_CHAIN, RELEASE_TOKEN.
name: Release
on:
  release:
    types: [released]
jobs:
  publish:
    name: 🚀 Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment:
      name: release
      url: https://plugins.jetbrains.com/plugin/20536-pyvenv-manage-2
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }} # zizmor: ignore[artipacked]
      - name: 🧹 Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # main
        with:
          tool-cache: false
          large-packages: false
      - name: ☕ Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: zulu
          java-version: 21
      - name: 🐘 Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # zizmor: ignore[cache-poisoning] (v6)
      - name: 🏷️ Set version from tag
        id: version
        run: |
          VERSION="${GITHUB_EVENT_RELEASE_TAG_NAME}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          sed -i "s/^pluginVersion=.*/pluginVersion=$VERSION/" gradle.properties
        env:
          GITHUB_EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
      - name: 📝 Update changelog
        if: ${{ github.event.release.body != '' }}
        run: |
          cat > /tmp/release-notes.txt << 'RELEASE_NOTES_EOF'
          ${GITHUB_EVENT_RELEASE_BODY}
          RELEASE_NOTES_EOF
          ./gradlew patchChangelog --release-note="$(cat /tmp/release-notes.txt)"
        env:
          GITHUB_EVENT_RELEASE_BODY: ${{ github.event.release.body }}
      - name: 📤 Publish to JetBrains Marketplace
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew publishPlugin
      - name: 📎 Upload release artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: gh release upload ${GITHUB_EVENT_RELEASE_TAG_NAME} ./build/distributions/*
  post-release:
    name: 📝 Post-release version bump
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    environment:
      name: release
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false
      - name: ☕ Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: zulu
          java-version: 21
      - name: 🐘 Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # zizmor: ignore[cache-poisoning] (v6)
      - name: 🏷️ Set version from tag
        id: version
        run: |
          VERSION="${GITHUB_EVENT_RELEASE_TAG_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          sed -i "s/^pluginVersion=.*/pluginVersion=$VERSION/" gradle.properties
        env:
          GITHUB_EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
      - name: 📝 Update changelog
        if: ${{ github.event.release.body != '' }}
        run: |
          cat > /tmp/release-notes.txt << 'RELEASE_NOTES_EOF'
          ${GITHUB_EVENT_RELEASE_BODY}
          RELEASE_NOTES_EOF
          ./gradlew patchChangelog --release-note="$(cat /tmp/release-notes.txt)"
        env:
          GITHUB_EVENT_RELEASE_BODY: ${{ github.event.release.body }}
      - name: 🔢 Calculate next dev version
        id: next
        run: |
          VERSION="${STEPS_VERSION_OUTPUTS_VERSION}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          echo "next_version=$MAJOR.$MINOR.$((PATCH + 1))-dev" >> $GITHUB_OUTPUT
        env:
          STEPS_VERSION_OUTPUTS_VERSION: ${{ steps.version.outputs.version }}
      - name: 📝 Create post-release PR
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          GITHUB_EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
          STEPS_NEXT_OUTPUTS_NEXT_VERSION: ${{ steps.next.outputs.next_version }}
        run: |
          VERSION="${GITHUB_EVENT_RELEASE_TAG_NAME}"
          NEXT_VERSION="${STEPS_NEXT_OUTPUTS_NEXT_VERSION}"
          BRANCH="post-release-$VERSION"

          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          cp CHANGELOG.md /tmp/CHANGELOG.md

          git fetch origin main
          git checkout -b $BRANCH origin/main

          sed -i "s/^pluginVersion=.*/pluginVersion=$NEXT_VERSION/" gradle.properties
          cp /tmp/CHANGELOG.md CHANGELOG.md

          git add gradle.properties CHANGELOG.md
          git commit -m "Bump version to $NEXT_VERSION after $VERSION release"
          git push --set-upstream origin $BRANCH

          gh pr create \
            --title "Bump version to \`$NEXT_VERSION\`" \
            --body "Post-release version bump after $VERSION release." \
            --head $BRANCH
